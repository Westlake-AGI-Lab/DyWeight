name: DyWeight
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip

  # Core
  - numpy>=1.23
  - scipy>=1.9
  - pillow>=9.0
  - tqdm>=4.64
  - click>=8.1
  - requests>=2.28

  # PyTorch (CUDA 11.8)
  - pytorch>=2.0
  - torchvision>=0.15
  - pytorch-cuda=11.8

  # LDM / SD dependencies
  - einops>=0.6
  - kornia>=0.6
  - omegaconf>=2.2
  - pytorch-lightning>=1.9

  - pip:
    # CLIP
    - open-clip-torch>=2.20
    - clip @ git+https://github.com/openai/CLIP.git

    # Tokenizers / transformers for LDM text encoders
    - transformers>=4.30

    # taming-transformers (VQ-VAE for LDM)
    - taming-transformers @ git+https://github.com/CompVis/taming-transformers.git

    # PNG loading for dataset
    - pyspng>=0.1
